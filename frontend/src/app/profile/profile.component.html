<div class="container mt-5" *ngIf="user">

  <div class="card shadow-lg border-0" style="max-width: 500px; margin: auto; border-radius: 20px;">

    <div class="card-body text-center">

      <!-- 👤 صورة -->


      <!-- 👤 الاسم + زرار -->
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h4 class="mb-0">{{ user.userName }}</h4>

        <button class="btn btn-sm btn-outline-primary"
                (click)="showEdit = !showEdit">
          <i class="fas fa-edit">Edit</i>
        </button>
      </div>

      <!-- 💰 Wallet -->
      <!-- 💰 Wallet -->
<div class="bg-light p-3 rounded mb-3">

  <span class="fw-bold text-success d-block mb-2">
    💰 {{ wallet?.balance || 0 }} EGP
  </span>

  <!-- زرار الشحن -->
  <button class="btn btn-outline-success btn-sm w-100"
          (click)="showDeposit = !showDeposit">
    Add Money
  </button>

  <!-- فورم الشحن -->
  <div *ngIf="showDeposit" class="mt-2">

    <input type="number"
           class="form-control mb-2"
           [(ngModel)]="depositAmount"
           placeholder="Enter amount">

    <button class="btn btn-success w-100"
            (click)="deposit()">
      Confirm
    </button>

  </div>

</div>
      <!-- 📧 بيانات -->
      <p class="text-muted mb-1">
        {{ user.role || 'User' }}
      </p>

      <p class="text-muted">
        {{ user.email }}
      </p>

      <!-- ✏️ Edit Form -->
      <div *ngIf="showEdit" class="mt-3 text-start">

        <input class="form-control mb-2"
               [(ngModel)]="editData.userName"
               placeholder="User Name">

        <input class="form-control mb-2"
               [(ngModel)]="editData.email"
               placeholder="Email">

        <button class="btn btn-success w-100"
                (click)="updateProfile()">
          Save Changes
        </button>

      </div>

    </div>

  </div>

</div>
