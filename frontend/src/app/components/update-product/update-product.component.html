<div class="card p-3 mb-3 mx-auto col-md-6">

  <h3 class="text-center mb-3">Update Product</h3>

  <div class="mb-2">

    <input
      type="text"
      class="form-control"
      placeholder="Title"
      [(ngModel)]="product.title"
    />

  </div>

  <div class="mb-2">

    <input
      type="text"
      class="form-control"
      placeholder="Brand"
      [(ngModel)]="product.brand"
    />

  </div>

  <div class="mb-2">

    <input
      type="text"
      class="form-control"
      placeholder="Description"
      [(ngModel)]="product.description"
    />

  </div>

  <div class="mb-2">

    <input
      type="number"
      class="form-control"
      placeholder="Price"
      [(ngModel)]="product.price"
    />

  </div>

  <div class="mb-2">

    <input
      type="number"
      class="form-control"
      placeholder="Quantity"
      [(ngModel)]="product.quantity"
    />

  </div>

  <div class="mb-2">

  <div class="mb-2 text-center" *ngIf="imagePreview || product.image">

    <img
      [src]="imagePreview ? imagePreview : ('http://localhost:3000' + product.image)"
      width="150"
      class="img-thumbnail"
    />

  </div>

  <label class="form-label">
    Upload New Image
  </label>

  <input
    type="file"
    class="form-control"
    (change)="onFileSelected($event)"
  />

</div>

  <button
    class="btn btn-warning w-100"
    (click)="updateProduct()">

    Update Product

  </button>

</div>
