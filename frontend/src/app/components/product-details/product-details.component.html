<div class="container mt-5" *ngIf="product; else noProduct">
  <div class="row">
    <div class="col-md-6 mb-4">
      <img [src]="product.image || 'assets/images/default.jpg'" 
           alt="Product" class="img-fluid rounded mb-3 product-image">
    </div>

    <div class="col-md-6">
      <h2 class="mb-3">{{ product.title }}</h2> 
      <p class="text-muted mb-4">SKU: {{ product._id }}</p>
      
      <div class="mb-3">
        <span class="h4 me-2">${{ product.price }}</span>
        <span [class]="product.stock > 0 ? 'text-success' : 'text-danger'">
          ({{ product.stock > 0 ? 'In Stock: ' + product.stock : 'Out of Stock' }})
        </span>
      </div>

      <p class="mb-4">{{ product.description }}</p>

      <button class="btn btn-primary" 
              (click)="addToCart(product, $event)" 
              [disabled]="product.stock === 0">
        <i class="bi bi-cart-plus"></i> 
        {{ product.stock > 0 ? 'Add to Cart' : 'Out of Stock' }}
      </button>
    </div>
  </div>
</div>

<ng-template #noProduct>
  <div class="container mt-5 text-center">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Loading product details or product not found...</p>
  </div>
</ng-template>
